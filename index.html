<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Museum Picture Machine</title>
    <link rel="preconnect" href="https://api.artic.edu" />
    <link rel="preconnect" href="https://collectionapi.metmuseum.org" />
    <link rel="preconnect" href="https://data.rijksmuseum.nl" />
    <link rel="preconnect" href="https://framemark.vam.ac.uk" />
    <link rel="preconnect" href="https://images.metmuseum.org" />
    <link rel="preconnect" href="https://openaccess-api.clevelandart.org" />
    <link rel="preconnect" href="https://openaccess-cdn.clevelandart.org" />
    <link rel="preconnect" href="https://www.artic.edu" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Open APIs + museum websites</p>
        <h1 id="page-title">Museum Picture Machine</h1>
        <p class="intro">
          Press the button and the page pulls a fresh artwork from open
          museum collections. A small art portal, basically. No velvet rope.
        </p>

        <div class="museum-picker">
          <label for="museum-select">Choose a museum</label>
          <select id="museum-select" name="museum">
            <option value="any">Any museum</option>
            <option value="met">The Met</option>
            <option value="aic">Art Institute of Chicago</option>
            <option value="cma">Cleveland Museum of Art</option>
            <option value="vam">Victoria and Albert Museum</option>
            <option value="rijks">Rijksmuseum</option>
            <option value="aitiev">Gapar Aitiev Museum</option>
          </select>
        </div>

        <div class="actions">
          <button id="randomize" type="button">Find random art</button>
          <a href="#picture-card">See current picture</a>
        </div>
      </section>

      <section id="picture-card" class="picture-card" aria-live="polite">
        <p id="museum-name" class="museum-name">Cleveland Museum of Art</p>
        <div class="picture-frame">
          <img
            id="random-picture"
            src="https://openaccess-cdn.clevelandart.org/1915.534/1915.534_web.jpg"
            alt="Portrait miniature of Nathaniel Hurd from the Cleveland Museum of Art"
          />
        </div>
        <div class="caption-row">
          <p id="caption">Nathaniel Hurd by John Singleton Copley, c. 1765</p>
          <a
            id="artwork-link"
            href="https://clevelandart.org/art/1915.534"
            target="_blank"
            rel="noreferrer noopener"
          >
            View record
          </a>
        </div>
      </section>
    </main>

    <script src="data/artmuseum-kg-paintings.js"></script>
    <script src="script.js"></script>
  </body>
</html>
